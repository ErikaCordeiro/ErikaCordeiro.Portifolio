{% load static %}
<section class="section projects" id="projetos">
  <div class="container">
    <div class="section-heading reveal">
      <span class="eyebrow">Projetos</span>
      <h2>Projetos reais publicados, com código aberto e experiência navegável.</h2>
    </div>
    <div class="project-grid">
      {% for project in projects %}
        <article class="project-card tilt-card reveal">
          <img src="{% static project.image %}" alt="Imagem do projeto {{ project.name }}" loading="lazy">
          <div class="project-card__body">
            <h3>{{ project.name }}</h3>
            <p>{{ project.description }}</p>
            <div class="chips">
              {% for tech in project.techs %}<span>{{ tech }}</span>{% endfor %}
            </div>
            <div class="project-card__actions">
              <a href="{{ project.github }}" target="_blank" rel="noreferrer">GitHub</a>
              <a href="{{ project.demo }}" target="_blank" rel="noreferrer">Site</a>
            </div>
          </div>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
